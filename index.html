<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1410">
<title>moodwatch — a film for tonight</title>
<meta name="description" content="A small ritual to find a film for tonight. Free, no signup. Optional Letterboxd watchlist.">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%231a1410'/><text x='32' y='44' font-size='40' text-anchor='middle' fill='%23c43b2a' font-family='serif' font-style='italic'>m</text></svg>">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<main>
  <header>
    <span class="brand">mood<em>watch</em></span>
    <span class="kicker" data-i18n="kicker">A ritual, not a form</span>
  </header>

  <!-- ─── quiz ─── -->
  <section class="step active" data-step="quiz">
    <div class="dots" id="dots"></div>
    <div class="q-num" id="q-num">
      <span></span><span class="bar"></span>
    </div>
    <h2 class="q-title" id="q-title"></h2>
    <div id="q-options" class="q-body"></div>
    <div class="qnav">
      <button id="q-back" data-i18n="back">Back</button>
      <button id="q-skip" data-i18n="skip">Skip</button>
    </div>
  </section>

  <!-- ─── vibe summary ─── -->
  <section class="step" data-step="vibe">
    <div class="q-num"><span data-i18n="vibe_label">Your vibe</span><span class="bar"></span></div>
    <h2 class="q-title" id="vibe-text"></h2>
    <p class="lead" data-i18n="vibe_lead">Now, the film.</p>
    <button class="restart" id="vibe-continue" data-i18n="continue">Continue</button>
  </section>

  <!-- ─── optional Letterboxd ─── -->
  <section class="step" data-step="lb">
    <div class="q-num"><span data-i18n="lb_label">Optional</span><span class="bar"></span></div>
    <h2 class="q-title" data-i18n="lb_title">Personalize <em>with your watchlist?</em></h2>
    <p class="lead" data-i18n="lb_lead">If you have Letterboxd, I'll pick from films you already wanted to see.</p>
    <div class="user-row">
      <span class="at">@</span>
      <input id="user" type="text" inputmode="latin" autocapitalize="off"
             autocomplete="off" autocorrect="off" spellcheck="false"
             data-i18n-attr="placeholder:user_ph">
    </div>
    <div class="lb-actions">
      <button class="primary" id="use-lb">
        <span data-i18n="use_lb">Use my watchlist</span>
        <span class="arrow">→</span>
      </button>
      <button id="skip-lb">
        <span data-i18n="skip_lb">Just recommend something</span>
        <span class="arrow">→</span>
      </button>
    </div>
  </section>

  <!-- ─── loading ─── -->
  <section class="step" data-step="loading">
    <div class="loader">
      <p class="loader-text" id="load-msg" data-i18n="loading">Reading the room…</p>
      <div class="shutter"></div>
    </div>
  </section>

  <!-- ─── results ─── -->
  <section class="step" data-step="results">
    <div class="results-head">
      <div class="q-num"><span data-i18n="picks_label">Tonight</span><span class="bar"></span></div>
    </div>
    <div id="cards"></div>
    <button class="restart" id="restart" data-i18n="restart">Start over</button>
  </section>

  <!-- ─── error ─── -->
  <section class="step" data-step="error">
    <div class="q-num"><span data-i18n="oops_label">Trouble</span><span class="bar"></span></div>
    <h2 class="q-title" data-i18n="oops">Something <em>broke.</em></h2>
    <p class="err-msg" id="err-msg"></p>
    <button class="restart" id="retry" data-i18n="retry">Try again</button>
  </section>
</main>

<footer>
  <div class="row">
    <a class="kofi" href="https://ko-fi.com/brmcl" target="_blank" rel="noopener">
      <span class="heart">♥</span>
      <span data-i18n="support">Support moodwatch</span>
    </a>
    <small>
      <span data-i18n="footer_made">Built with</span> ·
      <a href="https://letterboxd.com" target="_blank" rel="noopener">Letterboxd</a> ·
      <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDb</a> ·
      <a href="https://www.justwatch.com" target="_blank" rel="noopener">JustWatch</a>
    </small>
  </div>
</footer>

<script src="./i18n.js"></script>
<script src="./app.js"></script>
</body>
</html>
