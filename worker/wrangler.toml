name = "moodwatch-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# CORS / serving
[observability]
enabled = true

# KV bindings (created via: wrangler kv namespace create CACHE)
# After creation, paste the id below and uncomment.
# [[kv_namespaces]]
# binding = "CACHE"
# id = "REPLACE_WITH_KV_ID"

# Secrets (set via: wrangler secret put TMDB_API_KEY)
# Don't put real keys here.

[vars]
ALLOWED_ORIGINS = "https://brm-src.github.io,http://localhost:8787,http://127.0.0.1:5500"
