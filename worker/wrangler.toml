name = "moodwatch-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# CORS / serving
[observability]
enabled = true

# KV bindings
[[kv_namespaces]]
binding = "CACHE"
id = "798710cf68714b3695cf5a737ea83918"

# Secrets (set via: wrangler secret put TMDB_API_KEY)
# Don't put real keys here.

[vars]
ALLOWED_ORIGINS = "https://brm-src.github.io,http://localhost:8787,http://127.0.0.1:5500"
